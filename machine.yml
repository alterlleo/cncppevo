---

machine:
  A: 10.0            # max acceleration      [meters/secondssquare]
  tq: 0.005         # step time             [milliseconds]
  fmax: 10000       # maximum feedrate      [meters/minute]
  max_error: 0.005  # maximum allowable error [millimeters]
  zero:             # list -> it can be written also as zero: [500, 1000, 500]
    - 500
    - 1000
    - 500
    - 0
    - 0
  tools: [0.4, 3.0, 8.0, 5.0, 2.5]
  offset: [0, 0, 0, 0, 0] # distance between spindle center and working point (kind of tool lenght)
  mqtt:
    host: localhost
    port: 1883
    keepalive: 60
    topics:
      pub: "cnc/setpoint"
      sub: "cnc/status/#"
  axes:             # map of maps -> all of them are used in the machine simulator
    X: 
      length: 1                            #[meters]
      friction: 1000
      mass: 150
      max_torque: 20
      pitch: 0.01
      gravity: 0                           #[along the axis]
      integration_dt: 1  # step for dynamics integratos
      p: 50
      i: 0.0
      d: 13
    Y:
      length: 1                            #[meters]
      friction: 1000
      mass: 150
      max_torque: 20
      pitch: 0.01
      gravity: 0                           #[along the axis]
      integration_dt: 1  # step for dynamics integratos
      p: 50
      i: 0.0
      d: 13 
    Z: 
      length: 1                            #[meters]
      friction: 1000
      mass: 150
      max_torque: 20
      pitch: 0.01
      gravity: 0                           #[along the axis]
      integration_dt: 1  # step for dynamics integratos
      p: 50
      i: 0.0
      d: 13